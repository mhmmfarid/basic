<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mari Belajar</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Arial', sans-serif;
            background-color: #F0E68C;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            width: 360px;
            background-color: #FFF8DC;
            border-radius: 20px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            background-color: #FFD700;
        }

        .menu-icon, .profile-icon img {
            width: 60px;
            height: 60px;
        }

        .title {
            margin-right: 40px;
            font-size: 24px;
            font-weight: bold;
        }

        .content {
            padding: 20px;
        }

        .card {
            display: flex;
            align-items: center;
            background-color: #fff;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
            padding: 10px;
        }

        .card img {
            width: 40px;
            height: 40px;
            margin-right: 20px;
        }

        .card-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-grow: 1;
        }

        .card-content a {
            color: #000;
            text-decoration: none;
        }

        .card-content span {
            font-size: 18px;
            
        }

        .card-menu {
            font-size: 24px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="menu-icon">&#9776;</div>
            <div class="title">MariBelajar</div>
            <div class="profile-icon">
                <img src="icon.png" alt="Profile">
            </div>
        </header>
        <div class="content">
            <div class="card">
                <img src="html.png" alt="HTML5">
                <div class="card-content">
                    <a href="H.html">Materi HTML</a>
                    <div class="card-menu">&#8942;</div>
                </div>
            </div>
            <div class="card">
                <img src="css.png" alt="CSS3">
                <div class="card-content">
                    <a href="C.html">Materi CSS</a>
                    <div class="card-menu">&#8942;</div>
                </div>
            </div>
            <div class="card">
                <img src="js.png" alt="Java">
                <div class="card-content">
                    <a href="J.html">Materi javascript</a>
                    <div class="card-menu">&#8942;</div>
                </div>
            </div>
            <div class="card">
                <img src="php.png" alt="PHP">
                <div class="card-content">
                    <a href="P.html">Materi PHP</a>
                    <div class="card-menu">&#8942;</div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
